services:
  postgres:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_USER: sparkuser
      POSTGRES_PASSWORD: sparkpassword
      POSTGRES_DB: sparkdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - spark_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sparkuser -d sparkdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  spark-master:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: spark_master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:   
      - ./employees_raw.csv:/opt/spark/employees_raw.csv
      - ./spark_job.py:/opt/spark/spark_job.py
    networks:
      - spark_network
    depends_on:
      postgres:
        condition: service_healthy

  spark-worker:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: spark_worker
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    volumes:   
      - ./employees_raw.csv:/opt/spark/employees_raw.csv
      - ./spark_job.py:/opt/spark/spark_job.py
    networks:
      - spark_network
    depends_on:
      - spark-master

networks:
  spark_network:
    driver: bridge

volumes:
  postgres_data: